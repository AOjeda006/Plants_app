tags:
  - name: Auth
    description: Autenticación y gestión de sesión.
  - name: Plants
    description: Gestión de plantas del usuario.
  - name: Community
    description: Posts, likes y comentarios de la comunidad.
  - name: Chat
    description: Mensajería directa entre usuarios (REST + Socket.IO).
  - name: Users
    description: Perfil, preferencias y cuenta de usuario.
  - name: Reminders
    description: Recordatorios de riego generados por el cron job.
  - name: Weather
    description: Datos meteorológicos actuales y previsión (OpenWeatherMap).
  - name: Species
    description: Catálogo de especies de plantas con moderación de admin.
  - name: Upload
    description: Subida de imágenes a Cloudinary.
  - name: Notifications
    description: Notificaciones in-app generadas por el cron job (riego, poda, cosecha, clima).
  - name: Reports
    description: Reportes de incidencia enviados por usuarios.
  - name: Locations
    description: Catálogo estático de capitales de provincia españolas para selector de ubicación.
  - name: Admin
    description: Operaciones de administración (rol admin requerido).
  - name: Ops
    description: Operaciones, healthcheck y diagnósticos del servicio.
